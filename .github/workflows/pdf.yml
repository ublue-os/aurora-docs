name: Generate Docs PDF
on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  pdf:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Install Prince
        run: |
          curl -LO https://www.princexml.com/download/prince-16.2-linux-generic-x86_64.tar.gz
          tar zxf prince-16.2-linux-generic-x86_64.tar.gz
          cd prince-16.2-linux-generic-x86_64
          yes "" | sudo ./install.sh
      - name: Build PDF
        run: npx --yes --package github:signcl/docusaurus-prince-pdf#33905dfa2015e046655d8f970928e5eaa054be65 docusaurus-prince-pdf --toc -u https://docs.getaurora.dev -o pdf/aurora.pdf
      - name: Upload results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: aurora
          # The output filename can be specified with --output option
          path: pdf/aurora.pdf
          if-no-files-found: error
          overwrite: true
      - name: Upload Release Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload --clobber 0.1 pdf/aurora.pdf
